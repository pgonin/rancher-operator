---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - core.rancher-operator.io
  resources:
  - clusterprerequisites
  - ranchermanagers
  - targetclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.rancher-operator.io
  resources:
  - clusterprerequisites/finalizers
  - ranchermanagers/finalizers
  - targetclusters/finalizers
  verbs:
  - update
- apiGroups:
  - core.rancher-operator.io
  resources:
  - clusterprerequisites/status
  - ranchermanagers/status
  - targetclusters/status
  verbs:
  - get
  - patch
  - update
