# This rule is not used by the project rancher-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to core.rancher-operator.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: rancher-operator
    app.kubernetes.io/managed-by: kustomize
  name: clusterprerequisites-viewer-role
rules:
- apiGroups:
  - core.rancher-operator.io
  resources:
  - clusterprerequisites
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - core.rancher-operator.io
  resources:
  - clusterprerequisites/status
  verbs:
  - get
